<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego LEDMUS</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="menu-container">
        <button id="btn-iniciar" class="btn-grande">Iniciar</button>
        <button class="btn-pequeno abrir-video">Opciones</button>
        <button class="btn-pequeno abrir-video">Salir</button>
    </div>

    <div id="ventana-video" class="modal oculto">
        <button id="btn-cerrar">✖</button>
        <iframe id="mi-video" width="560" height="315" 
            src="https://www.youtube.com/embed/yMnHP8M2zfw?autoplay=0" 
            title="Video Receta" frameborder="0" 
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
            allowfullscreen>
        </iframe>
    </div>

    <script src="script.js"></script>
</body>
</html>
