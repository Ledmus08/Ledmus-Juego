<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú con Video y Frutillas</title>
    <link rel="stylesheet" href="style.css">
    <!-- Importamos una fuente moderna de Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="menu-container">
        <button id="btn-iniciar" class="btn-grande">Iniciar</button>
        <button class="btn-pequeno abrir-video">Opciones</button>
        <button class="btn-pequeno abrir-video">Salir</button>
    </div>

    <div id="ventana-video" class="modal oculto">
        <button id="btn-cerrar">✖</button>
        <video id="mi-video" controls>
            <source src="video1.mp4" type="video/mp4">
            Tu navegador no soporta la reproducción de videos.
        </video>
    </div>

    <script src="script.js"></script>
</body>
</html>
